services:
  postgres:
    image: postgres:15
    container_name: mcp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  mcp-server:
    build: ./mcp-server
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 1234
      DB_NAME: testdb
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  ai-client:
    build: ./ai-client
    ports:
      - "4000:4000"
    depends_on:
      - mcp-server